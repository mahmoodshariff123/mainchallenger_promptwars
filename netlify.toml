[build]
  # Netlify Python Functions auto-install requirements.txt; static/ is the site.
  publish = "static"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.12"
  DB_PATH = "/tmp/monsoon_ready.db"

[functions."api"]
  # Bundle the backend package with the function.
  included_files = ["app/**"]

[[redirects]]
  # Route all non-asset requests to the API function (SPA + API).
  from = "/api/*"
  to = "/.netlify/functions/api/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
